<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Novum Marketing</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Qurova'; src:url('Qurova-Bold.otf') format('opentype'); font-weight:700 900; font-display:swap; }
    @font-face { font-family:'Qurova'; src:url('Qurova-Light.otf') format('opentype'); font-weight:100 400; font-display:swap; }
    @font-face { font-family:'Aileron'; src:url('Aileron-Regular.otf') format('opentype'); font-weight:400 600; font-display:swap; }
    :root {
      --teal:#349fa8;
      --bg:#000; --surface:#0c0c0c;
      --border:#1e1e1e; --border-2:#2c2c2c;
      --text:#fff; --text-2:#9a9a9a; --text-3:#555; --text-4:#333;
      --ff-d:'Qurova','Syne',system-ui,sans-serif;
      --ff-b:'Aileron','DM Sans',system-ui,sans-serif;
      --ff-m:'DM Mono','Cascadia Code',monospace;
      --r:12px; --r-sm:8px;
      --ease-expo:cubic-bezier(.23,1,.32,1); --ease-quart:cubic-bezier(.25,1,.5,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    html{background:#000}
    body{background:transparent;color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;cursor:none;display:flex;flex-direction:column;min-height:100svh}
    @media(hover:none){body{cursor:auto}}
    a{color:inherit;text-decoration:none}
    img,svg{display:block;max-width:100%}
    button{font-family:inherit;cursor:none} @media(hover:none){button{cursor:pointer}}

    /* Cursor */
    .c-dot,.c-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    .c-dot{width:5px;height:5px;background:var(--teal);transition:transform .1s,width .2s var(--ease-quart),height .2s var(--ease-quart)}
    .c-ring{width:36px;height:36px;border:1px solid rgba(52,159,168,.5);transition:width .3s var(--ease-quart),height .3s var(--ease-quart),border-color .3s}
    .c-dot.hover{width:8px;height:8px} .c-ring.hover{width:56px;height:56px;border-color:var(--teal)}
    @media(hover:none){.c-dot,.c-ring{display:none}}

    .wrap{max-width:1280px;margin:0 auto;padding:0 24px;width:100%}
    @media(min-width:768px){.wrap{padding:0 48px}} @media(min-width:1280px){.wrap{padding:0 72px}}

    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:4px;font-family:var(--ff-b);font-size:.9rem;font-weight:600;letter-spacing:.01em;cursor:none;text-decoration:none;border:1px solid transparent;transition:background 160ms var(--ease-expo),border-color 160ms var(--ease-expo),box-shadow 160ms var(--ease-expo),transform 140ms var(--ease-expo)}
    .btn:active{transform:scale(.97)}
    .btn-teal{background:var(--teal);color:#000;border-color:var(--teal)}
    @media(hover:hover) and (pointer:fine){.btn-teal:hover{background:#3dbac4;border-color:#3dbac4;box-shadow:0 0 0 4px rgba(52,159,168,.18),0 6px 24px rgba(52,159,168,.30)}}
    .btn-outline{background:transparent;color:var(--text-2);border-color:var(--border-2)}
    @media(hover:hover) and (pointer:fine){.btn-outline:hover{color:var(--text);border-color:rgba(52,159,168,.4)}}

    /* Background */
    .bg-grad{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(100px)}
    .bb-1{width:600px;height:600px;top:-10%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(52,159,168,.12) 0%,transparent 70%)}
    .bb-2{width:400px;height:400px;bottom:10%;right:-5%;background:radial-gradient(circle,rgba(52,159,168,.06) 0%,transparent 70%)}

    /* Nav */
    .err-nav{padding:28px 0;border-bottom:1px solid var(--border)}
    .err-nav-inner{display:flex;align-items:center;justify-content:space-between}
    .err-logo{height:40px;width:auto;filter:brightness(0) invert(1)}

    /* Main */
    .err-main{flex:1;display:flex;align-items:center;padding:80px 0}
    .err-inner{display:flex;flex-direction:column;gap:0}
    .err-code{font-family:var(--ff-d);font-size:clamp(7rem,20vw,14rem);font-weight:800;letter-spacing:-.05em;line-height:.85;color:transparent;-webkit-text-stroke:1px rgba(52,159,168,.25);user-select:none;margin-bottom:8px}
    .err-eyebrow{font-family:var(--ff-m);font-size:.65rem;color:var(--teal);text-transform:uppercase;letter-spacing:.16em;margin-bottom:20px}
    .err-title{font-family:var(--ff-d);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-.02em;line-height:1.1;text-transform:uppercase;margin-bottom:16px}
    .err-sub{font-size:1rem;color:var(--text-2);line-height:1.7;max-width:42ch;margin-bottom:40px}
    .err-actions{display:flex;flex-wrap:wrap;gap:12px}

    /* Footer */
    .err-footer{padding:32px 0;border-top:1px solid var(--border)}
    .err-footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .err-footer-legal{font-family:var(--ff-m);font-size:.6rem;color:var(--text-4);text-transform:uppercase;letter-spacing:.07em}
    .err-footer-links{display:flex;gap:24px}
    .err-footer-links a{font-family:var(--ff-m);font-size:.6rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;transition:color .2s}
    @media(hover:hover) and (pointer:fine){.err-footer-links a:hover{color:var(--text)}}
  </style>
</head>
<body>
<div class="c-dot" id="c-dot"></div>
<div class="c-ring" id="c-ring"></div>
<div class="bg-grad" aria-hidden="true">
  <div class="bg-blob bb-1"></div>
  <div class="bg-blob bb-2"></div>
</div>

<nav class="err-nav">
  <div class="wrap">
    <div class="err-nav-inner">
      <a href="index.html"><img src="Novum.svg" alt="Novum Marketing" class="err-logo"></a>
    </div>
  </div>
</nav>

<main class="err-main">
  <div class="wrap">
    <div class="err-inner">
      <div class="err-code" aria-hidden="true">404</div>
      <div class="err-eyebrow">Page not found</div>
      <h1 class="err-title">This page<br>doesn't exist.</h1>
      <p class="err-sub">The link you followed may be broken, or the page may have been removed. Let's get you back on track.</p>
      <div class="err-actions">
        <a href="index.html" class="btn btn-teal">Back to Homepage</a>
        <a href="index.html#work" class="btn btn-outline">View Our Work</a>
      </div>
    </div>
  </div>
</main>

<footer class="err-footer">
  <div class="wrap">
    <div class="err-footer-inner">
      <div class="err-footer-legal">© 2026 Novum Marketing. All rights reserved.</div>
      <div class="err-footer-links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </div>
</footer>

<script>
  (function(){
    var dot=document.getElementById('c-dot');
    var ring=document.getElementById('c-ring');
    if(!dot||!ring) return;
    var mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'});
    function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing)}
    animRing();
    document.querySelectorAll('a,button').forEach(function(el){
      el.addEventListener('mouseenter',function(){dot.classList.add('hover');ring.classList.add('hover')});
      el.addEventListener('mouseleave',function(){dot.classList.remove('hover');ring.classList.remove('hover')});
    });
  })();
</script>
</body>
</html>
